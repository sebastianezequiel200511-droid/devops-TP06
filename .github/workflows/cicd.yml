# ============================================
# cicd.yml — Pipeline completo CI/CD
# TP0 7 — Plan DevOps
# ============================================
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.12"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: pip install flake8 yamllint

      - name: Lint Python
        run: |
          flake8 backend/ \
          --max-line-length=100 \
          --exclude=backend/tests/ \
          --ignore=E302,E305,E401,E702

      - name: Lint YAML
        run: |
          yamllint -d "{extends: default, rules: {document-start: disable, line-length: disable, truthy: disable, empty-lines: disable}}" docker-compose.yml .github/workflows/

  test:
    name: Test
    runs-on: ubuntu-latest

    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Ejecutar tests
        run: |
          cd backend
          pytest tests/ -v
