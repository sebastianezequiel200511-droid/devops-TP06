# ============================================
# cicd.yml — Pipeline completo CI/CD
# TP0 7 — Plan DevOps
# ============================================

name: CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────
on:
  push:
    branches:
      - main          # pipeline completo
      - develop       # solo CI (sin deploy)
      - 'feature/**'  # solo lint + test
  pull_request:
    branches:
      - main
      - develop

# ── Variables globales ────────────────────────────────────
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio
  PYTHON_VERSION: "3.12"

# ── Jobs ──────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias de lint
        run: pip install flake8 yamllint

      - name: Lint Python (flake8)
        run: |
          flake8 backend/ \
            --max-line-length=100 \
            --exclude=backend/tests/ \
            --count --statistics

      - name: Lint YAML (yamllint)
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}}}" \
            docker-compose.yml \
            .github/workflows/

  # ── Job 2: Test ────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint   # solo corre si lint pasa

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Correr tests con cobertura
        run: |
          cd backend
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ── Job 3: Build y Push ────────────────────────────────
  # Solo en main y develop (no en feature/*)
  build-push:
    name: Build y Push imagen
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Genera tags automáticos: latest, sha-abc123, v1.0 si hay tag
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # buildx permite builds multi-plataforma (linux/amd64 + linux/arm64)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: final
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache entre runs para builds más rápidos
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen del build
        run: |
          echo "### Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "Digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ── Job 4: Deploy ──────────────────────────────────────
  # Solo en main (nunca en develop ni feature)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production   # requiere aprobación manual si se configura

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/devops-portfolio
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deploy completado: $(date)"

      - name: Healthcheck post-deploy
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "http://${{ secrets.DEPLOY_HOST }}/health" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deploy exitoso — HTTP $STATUS"
          else
            echo "Deploy falló — HTTP $STATUS"
            exit 1
          fi

